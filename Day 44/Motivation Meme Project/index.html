<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Motivational Post</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: black;
        color: white;
        text-align: center;
      }

      /* Center container */
      .poster {
        width: 50%;
        margin-left: 25%;
        margin-top: 100px;
      }

      /* Image styling */
      img {
        width: 100%;
        border: 5px solid white;
      }

      /* Title */
      h1 {
        font-family: "Libre Baskerville", serif;
        text-transform: uppercase;
        margin-top: 20px;
      }

      /* Paragraph */
      p {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="poster">
      <!-- Put your image in /assets/images/ -->
      <img src="./assets/images/daenerys.jpeg" alt="motivational image" />

      <h1>Stay Focused</h1>
      <p>Discipline beats motivation every time.</p>
    </div>
  </body>
</html>
