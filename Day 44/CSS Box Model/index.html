<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Box Model</title>
    <style>
      /* All divs: size */
      div {
        height: 200px;
        width: 200px;
      }

      /* 1st box */
      #box1 {
        background-color: cadetblue;
        padding: 20px;
        border: 10px solid black;
      }

      /* Remove default paragraph margin */
      #box1 p {
        margin: 0;
      }

      /* 2nd box */
      #box2 {
        background-color: gold;
        border-top: 20px solid black;
        border-bottom: 20px solid black;
        border-left: 10px solid black;
        border-right: 10px solid black;
        margin-left: 260px; /* pushes it right next to box1 */
      }

      /* 3rd box */
      #box3 {
        background-color: indianred;
        border: 10px solid black;
        margin-left: 40px; /* aligns corner with box1 */
      }
    </style>
  </head>

  <body>
    <div id="box1">
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam at
        sapien porttitor urna elementum lacinia. In id magna pulvinar, ultricies
        lorem id, vehicula elit. Aliquam eu luctus nisl, vitae pellentesque
        magna. Phasellus dolor metus, laoreet ac convallis sit amet, efficitur
        sed dolor.
      </p>
    </div>

    <div id="box2"></div>

    <div id="box3"></div>
  </body>
</html>
