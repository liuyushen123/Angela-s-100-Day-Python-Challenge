<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Colors</title>
    <style>
      /* 1. Background of the webpage */
      body {
        background-color: antiquewhite;
      }

      /* 2 & 3. h1 text + background */
      h1 {
        color: whitesmoke;
        background-color: darkseagreen;
      }

      /* 4 & 5. h2 text + background */
      h2 {
        color: #faf8f1;
        background-color: #c58940;
      }
    </style>
  </head>

  <body>
    <h1>Hello</h1>
    <h2>World</h2>
  </body>
</html>
